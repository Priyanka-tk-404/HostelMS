name: Deploy Blazor to Netlify

on:
  push:
    branches: [ main ]
    paths:
      - 'HostelMS.Blazor/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore packages
      run: dotnet restore HostelMS.Blazor/HostelMS.Blazor.csproj

    - name: Publish Blazor WASM
      run: dotnet publish HostelMS.Blazor/HostelMS.Blazor.csproj -c Release -o publish

    - name: Add _redirects for Blazor routing
      run: echo "/* /index.html 200" > publish/wwwroot/_redirects

    - name: Deploy to Netlify
      uses: netlify/actions/cli@master
      with:
        args: deploy --prod --dir=publish/wwwroot
      env:
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
