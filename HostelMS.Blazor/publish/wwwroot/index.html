<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HostelMS - Smart Hostel Management</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
        #loading-screen {
            position:fixed; inset:0;
            background: linear-gradient(135deg,#6C3FC5 0%,#3B82F6 100%);
            display:flex; align-items:center; justify-content:center;
            flex-direction:column; gap:20px; z-index:9999;
            transition: opacity .4s ease;
        }
        .loading-logo { font-size:64px; animation: pulse 1.5s ease-in-out infinite; }
        .loading-title { color:#fff; font-size:28px; font-weight:800; font-family:'Inter',sans-serif; }
        .loading-sub { color:rgba(255,255,255,.7); font-size:14px; font-family:'Inter',sans-serif; }
        .loading-bar { width:200px; height:4px; background:rgba(255,255,255,.2); border-radius:99px; overflow:hidden; }
        .loading-bar-fill { height:100%; background:#fff; border-radius:99px; animation:load 2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        @keyframes load { 0%{width:0%} 60%{width:100%} 100%{width:100%;opacity:0} }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-logo">🏠</div>
        <div class="loading-title">HostelMS</div>
        <div class="loading-sub">Smart Hostel Management System</div>
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
    </div>

    <div id="app">
        <div class="loading-spinner" style="margin-top:20vh">
            <div class="spinner"></div>
            <div class="loading-text">Loading application...</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        // Hide loading screen once Blazor starts
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const el = document.getElementById('loading-screen');
                if (el) { el.style.opacity = '0'; setTimeout(() => el.remove(), 400); }
            }, 1800);
        });
    </script>
</body>
</html>
