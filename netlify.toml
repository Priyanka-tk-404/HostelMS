# Netlify configuration for Blazor WASM

[build]
  publish = "publish/wwwroot"
  command = "dotnet publish HostelMS.Blazor/HostelMS.Blazor.csproj -c Release -o publish"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
